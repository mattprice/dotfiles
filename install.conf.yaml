# https://github.com/anishathalye/dotbot#configuration

- defaults:
    link:
      create: true
      relink: true
      force: true
    shell:
      stdout: true

- clean: ["~"]

- link:
    # Terminal
    ~/.zshenv: zsh/zshenv.zsh
    ~/.zshrc: zsh/zshrc.zsh
    ~/.zshrc_local:
      path: zsh/zshrc_local.zsh
      if: "[[ -f zsh/zshrc_local.zsh ]]"
    ~/.bunfig.toml: bun/bunfig.toml
    ~/.config/ghostty: ghostty
    ~/.config/htop: htop
    ~/.config/lazygit: lazygit
    ~/.config/mise/config.toml: mise/mise.toml
    ~/.config/pip/pip.conf: pip/pip.conf
    ~/.config/pnpm/config.yaml: pnpm/config.yaml
    ~/.config/uv/uv.toml: uv/uv.toml
    ~/.config/zed/keymap.json: zed/keymap.json
    ~/.config/zed/settings.json: zed/settings.json
    ~/.default-npm-packages: mise/default-npm-packages
    ~/.default-gems: mise/default-gems
    ~/.gitconfig: git/gitconfig
    ~/.gitconfig_local:
      path: git/gitconfig_local
      if: "[[ -f git/gitconfig_local ]]"
    ~/.gitignore_global: git/gitignore_global
    ~/.yarnrc.yml: yarn/yarnrc.yml

    # Mac Applications
    ~/.config/karabiner:
      path: karabiner
      if: "[[ $(uname -s) == 'Darwin' ]]"
    ~/Library/Developer/Xcode/UserData/FontAndColorThemes:
      path: xcode
      if: "[[ $(uname -s) == 'Darwin' ]]"
    ~/.local/bin/code:
      path: /Applications/Visual Studio Code.app/Contents/Resources/app/bin/code
      if: "[[ $(uname -s) == 'Darwin' ]]"

- shell:
    - [mise install, Installing Mise tools]
    - [npm config set min-release-age 3, Setting npm min-release-age]

    - [./scripts/defaults.sh, Configuring macOS settings]
    - [./scripts/spotlight-ignore.rb, Configuring common Spotlight ignores]
    - [./scripts/default-apps.rb, Configuring default applications for files]
